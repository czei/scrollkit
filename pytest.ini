[pytest]
# Library test suite only. ThemeParkWaits app tests live in test/themeparkwaits/
# (a separate project) and are intentionally excluded.
testpaths = test/unit
python_files = test_*.py *_test.py test-*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark a test as an asyncio coroutine
addopts = --import-mode=importlib
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function