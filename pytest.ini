[pytest]
# The ScrollKit library test suite. Runs headlessly against the pygame simulator.
testpaths = test/unit
python_files = test_*.py *_test.py test-*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark a test as an asyncio coroutine
    ffmpeg: requires ffmpeg and ffprobe for a real MP4 encoding smoke test
    integration: exercises a multi-component integration path
addopts = --import-mode=importlib
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Hard per-test timeout (pytest-timeout): any test that runs away — e.g. a blocking
# window/event call like the 6-day zombie that prompted this — is aborted with a
# full thread-stack dump instead of hanging the run. Slowest real test is ~6s, so
# 60s is generous even on slower CI runners. The `thread` method also fires when the
# hang is in a GIL-releasing C call. Override a legitimately long test with
# @pytest.mark.timeout(N).
timeout = 60
timeout_method = thread
