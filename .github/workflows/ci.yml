name: CI

# Runs the headless unit suite (including the strict hardware-feasibility gate that
# every effect/transition must clear) and the critical-error lint on each push/PR.
# The suite runs against the pygame simulator with a dummy SDL driver, so no display
# or audio device is needed on the runner.

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Mirrors the project's [simulator] + [dev] extras. Installed directly (not
        # via `pip install -e .`) so the suite runs the same way it does locally —
        # against the in-tree package on PYTHONPATH=src, which the Makefile sets.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pygame>=2.0" "Pillow>=9.0" "numpy>=1.21" \
            "pytest>=7.0" "pytest-asyncio>=0.21" "pytest-cov>=4.0" \
            "ruff>=0.1" "requests>=2.28"

      - name: Critical-error lint
        run: make lint-errors

      - name: Unit tests (incl. strict feasibility gate)
        run: make test-unit
